<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tammy</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

#login {
    margin-top: 120px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

#gallery {
    display: none;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 20px;
}

.grid img {
    width: 100%;       /* 寬度隨格子填滿 */
    height: auto;      /* 高度根據圖片比例自動調整，不固定死 */
    object-fit: contain; /* 確保圖片內容完整顯示在容器內 */
    border-radius: 12px;
}

/* 防右鍵 */
body {
    user-select: none;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="login">
    <h2>🔒 Tammy</h2>
    <p>請輸入密碼</p>
    <input type="password" id="pw">
    <br>
    <button onclick="check()">進入</button>
</div>

<div id="gallery">
    <h1>tammy ❤️</h1>

<div class="grid">
    <img src="a.jpg" alt="Photo 1">
    <img src="b.jpg" alt="Photo 2">
</div>
</div>

<script>
function check(){
    if(document.getElementById("pw").value === "0320"){
        document.getElementById("login").style.display = "none";
        document.getElementById("gallery").style.display = "block";
    } else {
        alert("密碼錯誤");
    }
}
</script>

</body>
</html>
